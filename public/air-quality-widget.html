<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Air Quality</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --blue: #1a73e8;
        --green: #34a853;
        --yellow: #fbbc04;
        --red: #ea4335;
        --grey-900: #202124;
        --grey-700: #5f6368;
        --grey-200: #e8eaed;
        --grey-100: #f1f3f4;
        --grey-50: #f8f9fa;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--grey-50);
        padding: 16px;
        color: var(--grey-900);
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        border: 1px solid var(--grey-200);
        padding: 20px;
        box-shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 8px rgba(60,64,67,.08);
      }
      h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 2px; }
      .subtitle { font-size: 0.8rem; color: var(--grey-700); margin-bottom: 16px; }
      .controls { display: grid; gap: 12px; margin-bottom: 12px; }
      @media (min-width: 480px) { .controls { grid-template-columns: 1fr auto 1fr; align-items: end; } }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 0.7rem; font-weight: 500; color: var(--grey-700); text-transform: uppercase; letter-spacing: 0.04em; }
      select {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid #dadce0;
        font-size: 0.9rem;
        font-family: inherit;
        background: #fff;
        color: var(--grey-900);
      }
      select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,115,232,.2); }
      .swap-btn {
        width: 40px; height: 40px;
        border-radius: 50%;
        border: 1px solid #dadce0;
        background: #fff;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto;
        color: var(--grey-700);
        transition: all .2s;
      }
      .swap-btn:hover { border-color: var(--blue); background: #e8f0fe; color: var(--blue); }
      .compare-btn {
        width: 100%;
        border: none;
        border-radius: 999px;
        background: var(--blue);
        color: #fff;
        font-weight: 500;
        font-size: 0.9rem;
        padding: 12px;
        cursor: pointer;
        margin-bottom: 16px;
        font-family: inherit;
        transition: background .2s;
      }
      .compare-btn:hover { background: #1765cc; }
      .compare-btn:disabled { opacity: .6; cursor: not-allowed; }
      .error {
        background: #fce8e6;
        color: #c5221f;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 0.85rem;
        margin-bottom: 12px;
      }
      .summary {
        background: #e8f0fe;
        color: #174ea6;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 0.85rem;
        text-align: center;
        margin-bottom: 12px;
      }
      .cards { display: grid; gap: 12px; }
      @media (min-width: 480px) { .cards { grid-template-columns: 1fr 1fr; } }
      .card {
        border: 1px solid var(--grey-200);
        border-radius: 16px;
        padding: 16px;
        background: #fff;
        animation: slideUp .4s ease-out;
      }
      .card.winner { border-color: var(--green); box-shadow: 0 0 0 2px rgba(52,168,83,.12); }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
      .card-title { display: flex; align-items: center; gap: 8px; }
      .flag { font-size: 1.6rem; line-height: 1; }
      .country { font-size: 0.95rem; font-weight: 500; }
      .city { font-size: 0.75rem; color: var(--grey-700); }
      .badge-winner {
        font-size: 0.65rem;
        background: #e6f4ea;
        color: #137333;
        padding: 3px 8px;
        border-radius: 999px;
        font-weight: 500;
        white-space: nowrap;
      }
      .aqi-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
      .aqi { font-size: 2.5rem; font-weight: 400; line-height: 1; }
      .aqi-label { font-size: 0.8rem; color: var(--grey-700); }
      .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
      .status-badge {
        display: inline-flex; align-items: center; gap: 4px;
        color: #fff; font-size: 0.75rem; font-weight: 500;
        padding: 4px 10px; border-radius: 999px;
      }
      .status-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.8); }
      .risk-badge {
        font-size: 0.75rem; font-weight: 500;
        background: var(--grey-100); color: var(--grey-700);
        padding: 4px 10px; border-radius: 999px;
      }
      .pollutants { border-top: 1px solid var(--grey-200); padding-top: 12px; margin-bottom: 12px; }
      .pollutant { margin-bottom: 10px; }
      .pollutant:last-child { margin-bottom: 0; }
      .pollutant-header { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; }
      .pollutant-label { color: var(--grey-700); font-weight: 500; }
      .pollutant-value { color: var(--grey-900); }
      .pollutant-unit { color: #9aa0a6; }
      .bar-track { height: 6px; background: var(--grey-200); border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 999px; transition: width .7s ease-out; }
      .insight {
        background: var(--grey-50);
        border-radius: 10px;
        padding: 10px;
        font-size: 0.75rem;
        line-height: 1.5;
        color: var(--grey-700);
      }
      .skeleton .sk { background: linear-gradient(90deg, #f1f3f4 25%, #e8eaed 50%, #f1f3f4 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      .empty { text-align: center; padding: 32px 16px; color: var(--grey-700); font-size: 0.85rem; }
      .empty-icon { font-size: 2rem; margin-bottom: 8px; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <main>
      <h2>Global Air Quality Comparison</h2>
      <p class="subtitle">Live data from Open-Meteo · 14 countries</p>

      <div class="controls">
        <label>
          Country A
          <select id="country-a"></select>
        </label>
        <button type="button" class="swap-btn" id="swap-btn" aria-label="Swap countries">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
        </button>
        <label>
          Country B
          <select id="country-b"></select>
        </label>
      </div>

      <button type="button" class="compare-btn" id="compare-btn">Compare Air Quality</button>
      <div id="error" class="error" hidden></div>
      <div id="summary" class="summary" hidden></div>
      <div id="skeleton" class="cards skeleton" hidden>
        <div class="card"><div class="sk" style="height:120px"></div></div>
        <div class="card"><div class="sk" style="height:120px"></div></div>
      </div>
      <div id="empty" class="empty">
        <div class="empty-icon">🌍</div>
        Select two countries and click Compare
      </div>
      <div id="cards" class="cards"></div>
    </main>

    <script type="module">
      const COUNTRIES = [
        { id: "tunisia", label: "Tunisia", flag: "🇹🇳", location: "Tunis" },
        { id: "france", label: "France", flag: "🇫🇷", location: "Paris" },
        { id: "usa", label: "USA", flag: "🇺🇸", location: "New York" },
        { id: "uk", label: "UK", flag: "🇬🇧", location: "London" },
        { id: "germany", label: "Germany", flag: "🇩🇪", location: "Berlin" },
        { id: "japan", label: "Japan", flag: "🇯🇵", location: "Tokyo" },
        { id: "china", label: "China", flag: "🇨🇳", location: "Beijing" },
        { id: "india", label: "India", flag: "🇮🇳", location: "Delhi" },
        { id: "brazil", label: "Brazil", flag: "🇧🇷", location: "São Paulo" },
        { id: "canada", label: "Canada", flag: "🇨🇦", location: "Toronto" },
        { id: "australia", label: "Australia", flag: "🇦🇺", location: "Sydney" },
        { id: "egypt", label: "Egypt", flag: "🇪🇬", location: "Cairo" },
        { id: "saudi-arabia", label: "Saudi Arabia", flag: "🇸🇦", location: "Riyadh" },
        { id: "south-africa", label: "South Africa", flag: "🇿🇦", location: "Johannesburg" },
      ];

      const WHO = { pm25: 15, pm10: 45, no2: 25 };
      const COLORS = { Good: "#34a853", Moderate: "#fbbc04", Bad: "#ea4335" };

      const countryASel = document.getElementById("country-a");
      const countryBSel = document.getElementById("country-b");
      const compareBtn = document.getElementById("compare-btn");
      const swapBtn = document.getElementById("swap-btn");
      const errorEl = document.getElementById("error");
      const summaryEl = document.getElementById("summary");
      const skeletonEl = document.getElementById("skeleton");
      const emptyEl = document.getElementById("empty");
      const cardsEl = document.getElementById("cards");

      let state = window.openai?.toolOutput ?? null;
      let hasCompared = false;

      const fillSelect = (sel, selected) => {
        sel.innerHTML = COUNTRIES.map((c) =>
          `<option value="${c.id}" ${c.id === selected ? "selected" : ""}>${c.flag} ${c.label}</option>`
        ).join("");
      };

      fillSelect(countryASel, "canada");
      fillSelect(countryBSel, "india");

      const norm = (v, key) => Math.min(100, Math.round((v / WHO[key]) * 100));
      const barColor = (p) => p <= 60 ? "#34a853" : p <= 100 ? "#fbbc04" : "#ea4335";

      const showError = (msg) => { errorEl.textContent = msg; errorEl.hidden = !msg; };

      const renderPollutant = (label, value, key) => {
        const pct = norm(value, key);
        return `<div class="pollutant">
          <div class="pollutant-header">
            <span class="pollutant-label">${label}</span>
            <span class="pollutant-value">${value} <span class="pollutant-unit">μg/m³</span></span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>
        </div>`;
      };

      const renderCard = (data, isWinner) => {
        const color = COLORS[data.status] ?? "#5f6368";
        return `<article class="card${isWinner ? " winner" : ""}">
          <div class="card-header">
            <div class="card-title">
              <span class="flag">${data.flag ?? ""}</span>
              <div><div class="country">${data.country}</div><div class="city">${data.location}</div></div>
            </div>
            ${isWinner ? '<span class="badge-winner">Best Air Quality 🏆</span>' : ""}
          </div>
          <div class="aqi-row"><span class="aqi" style="color:${color}">${data.aqi}</span><span class="aqi-label">AQI</span></div>
          <div class="badges">
            <span class="status-badge" style="background:${color}"><span class="status-dot"></span>${data.status}</span>
            <span class="risk-badge">Risk: ${data.riskLevel}</span>
          </div>
          <div class="pollutants">
            ${renderPollutant("PM2.5", data.pm25, "pm25")}
            ${renderPollutant("PM10", data.pm10, "pm10")}
            ${renderPollutant("NO₂", data.no2, "no2")}
          </div>
          <p class="insight">${data.insight}</p>
        </article>`;
      };

      const render = (result) => {
        if (!result?.countryA || !result?.countryB) {
          cardsEl.innerHTML = "";
          summaryEl.hidden = true;
          emptyEl.hidden = false;
          return;
        }
        emptyEl.hidden = true;
        if (result.summary) { summaryEl.textContent = result.summary; summaryEl.hidden = false; }
        else summaryEl.hidden = true;
        const better = result.betterCountry;
        cardsEl.innerHTML = [
          renderCard(result.countryA, better === result.countryA.country),
          renderCard(result.countryB, better === result.countryB.country),
        ].join("");
      };

      const updateFromResponse = (response) => {
        const content = response?.structuredContent;
        if (content?.countryA && content?.countryB) {
          state = content;
          render(state);
        }
      };

      window.addEventListener("openai:set_globals", (event) => {
        const output = event.detail?.globals?.toolOutput;
        if (output?.countryA) { state = output; render(state); emptyEl.hidden = true; hasCompared = true; }
      }, { passive: true });

      const compare = async () => {
        const countryA = countryASel.value;
        const countryB = countryBSel.value;
        if (countryA === countryB) { showError("Please select two different countries."); return; }
        showError("");
        skeletonEl.hidden = false;
        cardsEl.innerHTML = "";
        emptyEl.hidden = true;
        summaryEl.hidden = true;
        compareBtn.disabled = true;

        try {
          if (window.openai?.callTool) {
            const response = await window.openai.callTool("compare_air_quality", { countryA, countryB });
            updateFromResponse(response);
          } else {
            const params = new URLSearchParams({ countryA, countryB });
            const res = await fetch(`/api/mcp?${params}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error ?? "Request failed");
            state = data;
            render(state);
          }
          hasCompared = true;
        } catch (err) {
          showError(err.message ?? "Failed to compare");
        } finally {
          skeletonEl.hidden = true;
          compareBtn.disabled = false;
        }
      };

      compareBtn.addEventListener("click", compare);
      swapBtn.addEventListener("click", () => {
        const tmp = countryASel.value;
        countryASel.value = countryBSel.value;
        countryBSel.value = tmp;
        if (hasCompared) compare();
      });

      countryASel.addEventListener("change", () => { if (hasCompared) compare(); });
      countryBSel.addEventListener("change", () => { if (hasCompared) compare(); });

      if (state?.countryA) { render(state); emptyEl.hidden = true; hasCompared = true; }
    </script>
  </body>
</html>
